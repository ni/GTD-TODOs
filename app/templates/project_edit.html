{% extends "base.html" %}

{% block title %}Edit Project – {{ app_name }}{% endblock %}

{% block content %}
<section class="page-edit">
  <h1>Edit Project</h1>

  <form action="/projects/{{ project.id }}/update" method="post" class="edit-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" value="{{ project.name }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" name="description" value="{{ project.description or '' }}">
    </div>

    <div class="form-group">
      <label for="notes">Notes <span class="hint">(Markdown supported)</span></label>
      <textarea id="notes" name="notes" rows="8">{{ project.notes or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="due_date">Due Date</label>
      <input type="date" id="due_date" name="due_date" value="{{ project.due_date or '' }}">
    </div>

    <div class="form-actions">
      <button type="submit" name="action" value="save" class="btn-primary">Save</button>
      <button type="submit" name="action" value="close" class="btn-primary">Save and Close</button>
      <a href="/projects/{{ project.id }}" class="btn-secondary">Cancel</a>
    </div>
  </form>

  {% if project.notes %}
  <div class="notes-preview">
    <h2>Notes Preview</h2>
    <div class="rendered-markdown">{{ render_markdown(project.notes) | safe }}</div>
  </div>
  {% endif %}
</section>
{% endblock %}
