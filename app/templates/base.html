<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}?v=4" sizes="any">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}?v=4">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='apple-touch-icon.png') }}?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body>
    <nav class="top-nav">
      <a href="/inbox" class="nav-brand">{{ app_name | default('GTD TODOs') }}</a>
      <ul class="nav-links">
        <li><a href="/inbox">Inbox</a></li>
      </ul>
    </nav>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
